name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps, code, or command to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Submit job with `...`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SDK / CLI / MCP version, or API endpoint involved.
      placeholder: "@rendobar/sdk 1.0.0"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime (Node/Bun/Deno) and version, anything else relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs or error output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
